name: Deploy Laravel to VPS

on:
  push:
    branches:
      - Second

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: VPS

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "===> Pull latest code"
            git fetch origin
            git reset --hard origin/Second

            echo "===> Sync Laravel server files"
            rsync -a --delete server/ ./

            echo "===> Ensure public directory exists"
            mkdir -p public

            echo "===> Sync frontend files"
            rsync -a --delete NihonAccess/ public/

            echo "===> Build frontend"
            cd public
            npm install
            npm run build

            echo "===> Deployment completed"
